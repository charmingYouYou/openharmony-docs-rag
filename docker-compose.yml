# Docker Compose stack for the OpenHarmony Docs RAG delivery deployment.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openharmony-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  app:
    image: ${OPENHARMONY_RAG_IMAGE:-ghcr.io/charmingyouyou/openharmony-docs-rag-app:latest}
    container_name: openharmony-rag-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - .env
    depends_on:
      - qdrant
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  qdrant_storage:
