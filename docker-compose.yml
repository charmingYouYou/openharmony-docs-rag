# Docker Compose stack for the OpenHarmony Docs RAG delivery deployment.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openharmony-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  app:
    image: ${OPENHARMONY_RAG_IMAGE:-ghcr.io/charmingyouyou/openharmony-docs-rag-app:latest}
    container_name: openharmony-rag-app
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./data:/app/data
      - ./deploy/app.env:/app/deploy/app.env
      - ./storage:/app/storage
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    env_file:
      - ./deploy/app.env
    depends_on:
      - qdrant
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, urllib.request; port = os.environ.get('API_PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  qdrant_storage:
